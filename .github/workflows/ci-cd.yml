# Pipeline CI/CD — GitHub Actions
# Job "test" ejecuta pytest; si falla, "build-and-deploy" no se ejecuta

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: acrmibackenddemo
  IMAGE_NAME: mi-backend
  RESOURCE_GROUP: rg-mi-backend
  CONTAINER_APP_NAME: mi-backend-app
  CONTAINER_APP_ENV: cae-mi-backend

jobs:

  # Job 1: Pruebas automatizadas
  test:
    name: "🧪 Ejecutar pruebas (pytest)"
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar pruebas con pytest
        run: pytest -v --tb=short

  # Job 2: Build y despliegue (solo si test pasa)
  build-and-deploy:
    name: "🚀 Construir y desplegar"
    runs-on: ubuntu-latest
    needs: test  # Dependencia: requiere que test pase

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login en ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      # Tag con SHA del commit para trazabilidad + latest
      - name: Construir imagen Docker
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Push de imagen a ACR
        run: |
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Desplegar en Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
