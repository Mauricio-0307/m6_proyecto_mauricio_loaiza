# Docker Compose — Entorno local (Flask + PostgreSQL)
# Para producción en Azure se recomienda Azure Database for PostgreSQL

services:

  # Base de datos PostgreSQL 15
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Aplicación Flask
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    # Espera a que PostgreSQL esté listo antes de arrancar
    depends_on:
      db:
        condition: service_healthy

# Volumen para persistencia de datos de PostgreSQL
volumes:
  pgdata:
